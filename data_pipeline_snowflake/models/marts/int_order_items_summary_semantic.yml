version: 2

semantic_models:
  - name: int_order_items_summary
    description: Order-level rollup of line-item pricing metrics (extended_price and item_discount_amount) aggregated by order_key.
    model: ref('int_order_items_summary')
    defaults:
      agg_time_dimension: order_date

    # Use a distinct primary entity name to avoid duplicate (primary entity, dimension) pairings
    # across semantic models (e.g., fact_orders already uses primary entity `order` + order_date).
    entities:
      - name: order_items_summary
        type: primary
        expr: order_key
      - name: order
        type: foreign
        expr: order_key

    dimensions:
      - name: order_date
        type: time
        type_params:
          time_granularity: day

    measures:
      - name: int_order_items_summary_order_count
        description: Distinct count of orders (1 per order_key at this semantic model grain).
        agg: count_distinct
        expr: order_key
      - name: int_order_items_summary_gross_item_sales
        description: Sum of gross_item_sales_amount across orders. Upstream is extended_price rolled up to order_key.
        agg: sum
        expr: gross_item_sales_amount
      - name: int_order_items_summary_item_discount
        description: Sum of item_discount_amount across orders. With current macro this is negative (discounts are stored as negative amounts).
        agg: sum
        expr: item_discount_amount